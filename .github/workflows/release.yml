name: Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0, v0.2.0-rc.1). Leave blank for a dry run.'
        required: false
        default: ''

permissions:
  contents: write

# Don't cancel an in-flight release — we'd rather wait than leave a tag half-published.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: '1'
  DOTNET_NOLOGO: '1'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: '1'

jobs:
  build:
    name: Build AOT artifacts (${{ matrix.rid }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        rid: [win-x64, win-arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      # Parses the tag (or workflow_dispatch input) into the parts the rest
      # of the build needs. Supports semver prerelease / build metadata so
      # tags like v1.0.0-rc.1 round-trip into InformationalVersion correctly.
      - name: Read version
        id: version
        shell: pwsh
        run: |
          if ('${{ github.event.inputs.tag }}' -ne '') {
            $tag = '${{ github.event.inputs.tag }}'
          } elseif ($env:GITHUB_REF_TYPE -eq 'tag') {
            $tag = $env:GITHUB_REF_NAME
          } else {
            $tag = 'v0.0.0-dev'
          }
          $bare = $tag -replace '^v', ''
          # semver: NUMERIC(-PRERELEASE)?(+BUILD)?
          if ($bare -notmatch '^(\d+(?:\.\d+){0,3})(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$') {
            throw "Tag '$tag' doesn't look like a valid version (e.g. v0.1.0, v0.2.0-rc.1)"
          }
          $numeric = $Matches[1]
          $prerelease = if ($Matches[2]) { $Matches[2] } else { '' }
          $buildMeta = if ($Matches[3]) { $Matches[3] } else { '' }
          # Pad to 4 parts so Win32 FILEVERSION has all four DWORDs.
          while (($numeric.Split('.')).Count -lt 4) { $numeric += '.0' }
          $fileVersion = $numeric
          # InformationalVersion (Product version in Explorer) keeps the suffix.
          $informational = ($fileVersion.Split('.')[0..2] -join '.') + $prerelease + $buildMeta
          $isPrerelease = if ($prerelease) { 'true' } else { 'false' }

          "tag=$tag"                     | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "file_version=$fileVersion"    | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "informational=$informational" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "is_prerelease=$isPrerelease"  | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Tag: $tag -> FileVersion=$fileVersion, InformationalVersion=$informational (prerelease=$isPrerelease)"

      - name: Publish Launcher (AOT)
        env:
          VER_INF: ${{ steps.version.outputs.informational }}
          VER_FILE: ${{ steps.version.outputs.file_version }}
        shell: pwsh
        run: |
          dotnet publish src/BrowseRouter.Launcher `
            -c Release `
            -r ${{ matrix.rid }} `
            -o out `
            /p:Version=$env:VER_INF `
            /p:FileVersion=$env:VER_FILE `
            /p:AssemblyVersion=$env:VER_FILE `
            /p:InformationalVersion=$env:VER_INF

      - name: Publish Host (AOT)
        env:
          VER_INF: ${{ steps.version.outputs.informational }}
          VER_FILE: ${{ steps.version.outputs.file_version }}
        shell: pwsh
        run: |
          dotnet publish src/BrowseRouter.Host `
            -c Release `
            -r ${{ matrix.rid }} `
            -o out `
            /p:Version=$env:VER_INF `
            /p:FileVersion=$env:VER_FILE `
            /p:AssemblyVersion=$env:VER_FILE `
            /p:InformationalVersion=$env:VER_INF

      # Strip PDBs (kept locally in dist/; not needed in the CI payload).
      # Host.csproj already ships the template via <Content Include> with
      # CopyToOutputDirectory, but copy again as a safety net.
      - name: Finalize payload
        shell: pwsh
        run: |
          Get-ChildItem -Path out -Recurse -Filter '*.pdb' | Remove-Item -Force
          Copy-Item config/browsers.template.json out/

      - name: Pack payload
        shell: pwsh
        run: |
          $tag = '${{ steps.version.outputs.tag }}'
          $rid = '${{ matrix.rid }}'
          $zip = "BrowseRouterAOT-$tag-$rid.zip"
          Compress-Archive -Path out/* -DestinationPath $zip -Force
          Get-Item $zip | Format-Table Name, Length

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: browserouter-aot-${{ matrix.rid }}
          path: '*.zip'
          if-no-files-found: error
          retention-days: 90

  release:
    name: Publish GitHub Release
    runs-on: windows-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      # Need the repo locally to read the annotated tag's message.
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Read tag annotation
        id: tagmsg
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}'
          # %(contents) is empty for lightweight tags.
          $msg = (git tag -l --format='%(contents)' $tag).Trim()
          if ($msg) {
            Write-Host "Tag '$tag' is annotated. Will prepend its message to auto-generated notes."
            Write-Host '---'
            Write-Host $msg
            Write-Host '---'
            $has = 'true'
            $msgOut = $msg
          } else {
            Write-Host "Tag '$tag' is lightweight (no annotation). Will use auto-generated notes only."
            $has = 'false'
            $msgOut = ''
          }
          "has_annotation=$has"     | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "body<<__RELEASE_BODY__"   | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          $msgOut                   | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "__RELEASE_BODY__"         | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: browserouter-aot-*
          path: .
          merge-multiple: true

      # softprops/action-gh-release concatenates our `body` (annotation)
      # with the auto-generated "What's Changed" notes — annotation on top,
      # generated notes below, in a single API call. No follow-up
      # `gh release edit` needed.
      #
      # Prerelease detection: any tag with a `-` after the numeric part is a
      # prerelease per semver (e.g. v1.0.0-rc.1, v1.0.0-beta.2, v1.0.0-alpha.1).
      # Build metadata (+build.1) doesn't trigger this — those stay as full releases.
      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          body: ${{ steps.tagmsg.outputs.body }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
          files: |
            *.zip
